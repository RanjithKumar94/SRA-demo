<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRA Radar Simulator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="container">


<!-- ========================= -->
<!-- RADAR DISPLAY -->
<!-- ========================= -->

<div id="radarContainer">

<canvas id="radar" width="800" height="800"></canvas>





</div>



<!-- ========================= -->
<!-- CONTROL PANEL -->
<!-- ========================= -->


<div id="controlPanel">


<h2>SRA CONTROL</h2>



<!-- Aircraft Information -->

<h3>Aircraft</h3>


<input
type="text"
id="callsign"
readonly
placeholder="Select Aircraft"
>


<br><br>



<!-- ========================= -->
<!-- TURN CONTROL -->
<!-- ========================= -->


<h3>TURN INSTRUCTION</h3>


<button id="turnLeft">
TURN LEFT
</button>


<button id="stopTurn">
STOP TURN
</button>


<button id="turnRight">
TURN RIGHT
</button>

<div id="clock">
05:00:00
</div>

<br><br>



<!-- ========================= -->
<!-- SPEED CONTROL -->
<!-- ========================= -->


<h3>SPEED CONTROL</h3>


<label>
Target Speed (KT)
</label>


<br>


<input
type="number"
id="speed"
value="180"
>


<button id="applySpeed">
SET SPEED
</button>



<br><br>




<!-- ========================= -->
<!-- LEVEL CLEARANCE -->
<!-- ========================= -->


<h3>LEVEL CLEARANCE</h3>


<label>
Cleared FL
</label>


<br>


<input
type="number"
id="level"
placeholder="Example 50"
>


<button id="applyBtn">
APPLY CLEARANCE
</button>
<label>Runway</label>

<select id="runwaySelect">

    <option value="08">RWY 08</option>
    <option value="26">RWY 26</option>
    <option value="15">RWY 15</option>
    <option value="33">RWY 33</option>

</select>


<br><br>




<!-- ========================= -->
<!-- RADAR RANGE -->
<!-- ========================= -->


<h3>RADAR RANGE</h3>


<button onclick="setRadarRange(60)">
60 NM
</button>


<button onclick="setRadarRange(30)">
30 NM
</button>


<button onclick="setRadarRange(15)">
15 NM
</button>



<br><br>




<!-- ========================= -->
<!-- SIM CONTROL -->
<!-- ========================= -->


<button id="pauseBtn">
PAUSE
</button>


<button id="resumeBtn">
RESUME
</button>



</div>


</div>



<script src="js/aircraft.js"></script>

<script src="js/main.js"></script>

<script src="js/radar.js"></script>



</body>

</html>
